<!-- GUI incuding Canvas for game and debugging window-->
<!-- REFERENCES: https://developer.mozilla.org/en-US/docs/Web/API/Canvas_API/Tutorial/Basic_usage -->

<!doctype html>
<html>
    <head>
        <title>4011-Project</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&display=swap" rel="stylesheet">
        
    </head>

    <body>
        <section id="gameSection">
            <h1 id="gameTitle">LIVER SENTINEL</h1>
            <canvas id="gameCanvas"></canvas>
        </section>
        
        <section id="telemetrySection">
            <h2>Telemetry</h2>

            <p>Player: <span id="playerIndex">0</span></p>
            <p>gy: <span id="gyValue">0</span></p>
            <p>gz: <span id="gzValue">0</span></p>
            
            <p>Pitch: <span id="pitchValue">0</span></p>
            <p>Roll: <span id="rollValue">0</span></p>
            <p>Packets/sec: <span id="packetValue">0</span></p>
            <p>Latency: <span id="latencyValue">0</span> ms</p>
            <p>Gesture: <span id="gestureValue">None</span></p>
            <p>Websocket: <span id="websocketValue">"NO"</span></p>
        </section>

        <script src="game.js"></script>
    </body>

</html>
